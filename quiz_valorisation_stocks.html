
<h2 class="sr-only">Quiz de 20 questions – Valorisation des stocks : PEPS pour les DLC, CMUP pour les DDM et le non alimentaire</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.prog-wrap{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.prog-bar-bg{flex:1;height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
.prog-bar-fill{height:100%;background:#D85A30;border-radius:3px;transition:width .35s}
.q-counter{font-size:13px;color:var(--color-text-secondary);white-space:nowrap}
.q-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.q-text{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem;line-height:1.65}
.q-opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:.7rem 1rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);text-align:left;line-height:1.5}
.opt:hover:not(:disabled){background:var(--color-background-secondary);border-color:var(--color-border-primary)}
.opt:disabled{cursor:default}
.opt.correct{background:#EAF3DE;border-color:#639922;color:#27500A;font-weight:500}
.opt.wrong{background:#FCEBEB;border-color:#E24B4A;color:#791F1F}
.opt.reveal{background:#E6F1FB;border-color:#378ADD;color:#0C447C;font-weight:500}
.expl{margin-top:.75rem;font-size:13px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.65rem .9rem;line-height:1.6;display:none}
.expl.show{display:block}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.score-inline{font-size:13px;color:var(--color-text-secondary)}
.btn-next{padding:.55rem 1.25rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;cursor:pointer;display:none;align-items:center;gap:6px}
.btn-next.show{display:flex}
.btn-next:hover{background:var(--color-background-secondary)}
.score-box{text-align:center;padding:2rem 1rem;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg)}
.score-big{font-size:52px;font-weight:500;color:#D85A30;line-height:1}
.score-denom{font-size:18px;color:var(--color-text-secondary);margin-top:.25rem}
.score-msg{font-size:14px;color:var(--color-text-primary);margin-top:1rem;line-height:1.75;max-width:480px;margin-left:auto;margin-right:auto}
.btn-restart{margin-top:1.25rem;padding:.6rem 1.5rem;border:0.5px solid #D85A30;border-radius:var(--border-radius-md);background:transparent;color:#D85A30;font-size:14px;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.btn-restart:hover{background:#FAECE7}
.recap-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin:1.25rem 0}
.recap-dot{height:8px;border-radius:4px}
.dot-ok{background:#639922}
.dot-no{background:#E24B4A}
</style>

<div style="padding:1rem 0" id="quiz-wrap">
  <div id="quiz-main">
    <div class="prog-wrap">
      <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog" style="width:5%"></div></div>
      <span class="q-counter" id="counter">1 / 20</span>
    </div>
    <div class="q-card">
      <div class="q-text" id="q-text"></div>
      <div class="q-opts" id="q-opts"></div>
      <div class="expl" id="q-expl"></div>
      <div class="nav">
        <span class="score-inline" id="score-live">Score : 0 / 0</span>
        <button class="btn-next" id="btn-next" onclick="nextQ()">Question suivante <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
      </div>
    </div>
  </div>
  <div id="quiz-score" style="display:none">
    <div class="score-box">
      <div class="score-big" id="final-num"></div>
      <div class="score-denom">/ 20 bonnes réponses</div>
      <div class="recap-grid" id="recap-grid"></div>
      <div class="score-msg" id="score-msg"></div>
      <button class="btn-restart" onclick="restart()"><i class="ti ti-refresh" aria-hidden="true"></i> Recommencer</button>
    </div>
  </div>
</div>

<script>
const Q=[
  {q:"Que signifie l'acronyme DLC ?",
   o:["Date Limite de Commercialisation","Date Limite de Consommation","Date Légale de Contrôle","Date de Livraison Contractuelle"],
   a:1,
   e:"La DLC (Date Limite de Consommation) indique la date au-delà de laquelle un produit ne peut plus être vendu ni consommé. Son dépassement est strictement interdit."},

  {q:"Que signifie l'acronyme DDM ?",
   o:["Date de Déstockage Maximale","Date De Mise en rayon","Date de Durabilité Minimale","Date Dépréciée en Magasin"],
   a:2,
   e:"DDM = Date de Durabilité Minimale. Elle remplace officiellement la DLUO depuis le règlement européen INCO (2014). Le produit reste consommable après cette date."},

  {q:"Quelle est la différence fondamentale entre la DLC et la DDM ?",
   o:["La DLC concerne l'alimentaire, la DDM le non alimentaire","La DLC est indicative, la DDM est obligatoire","La DLC interdit toute consommation après la date, la DDM est indicative sur la qualité","La DDM est plus courte que la DLC"],
   a:2,
   e:"La DLC est une limite stricte : dépassement interdit à la vente et à la consommation. La DDM indique que le produit conserve ses qualités optimales jusqu'à cette date, mais reste consommable après."},

  {q:"Quelle méthode de valorisation est utilisée pour les produits avec DLC ?",
   o:["CMUP fin de période","CMUP à chaque entrée","PEPS","Les deux méthodes sont possibles"],
   a:2,
   e:"PEPS (Premier Entré, Premier Sorti) est la seule méthode adaptée aux produits avec DLC. L'ordre de sortie est une obligation sanitaire stricte : les produits les plus anciens doivent impérativement être vendus en premiers."},

  {q:"Quelle méthode de valorisation est utilisée pour les produits avec DDM ?",
   o:["PEPS uniquement","CMUP","Les deux sont équivalentes","Aucune méthode n'est requise"],
   a:1,
   e:"Le CMUP s'applique aux produits avec DDM. La DDM étant indicative, il n'y a pas d'obligation sanitaire stricte sur l'ordre de sortie — le lissage des prix d'achat prime."},

  {q:"Quelle méthode applique-t-on pour les produits non alimentaires (textile, hygiène, bazar) ?",
   o:["PEPS","CMUP","PEPS ou CMUP au choix du responsable","Aucune méthode spécifique"],
   a:1,
   e:"Le CMUP s'applique au non alimentaire. Sans DLC ni DDM, l'enjeu est de lisser les variations de prix entre livraisons et de simplifier la comptabilité du rayon."},

  {q:"Que signifie PEPS ?",
   o:["Prix En Points de Sortie","Premier Entré, Premier Sorti","Produit Épuisé, Prix Suivant","Priorité En Période de Stock"],
   a:1,
   e:"PEPS = Premier Entré, Premier Sorti. C'est l'équivalent du FIFO en anglais (First In, First Out)."},

  {q:"Que signifie CMUP ?",
   o:["Coût Mensuel Unitaire Par article","Coût Moyen Unitaire Pondéré","Calcul Mensuel d'Unités en Promotion","Comptage Mensuel des Unités Payées"],
   a:1,
   e:"CMUP = Coût Moyen Unitaire Pondéré. Il s'agit d'un prix moyen calculé en pondérant les quantités et les prix de tous les achats."},

  {q:"Dans la méthode PEPS, comment les articles sont-ils sortis du stock ?",
   o:["Les moins chers en premier","Les plus récents en premier","Les plus anciens en premier","Par ordre alphabétique"],
   a:2,
   e:"En PEPS, les articles les plus anciens (premier entrés) sortent en premier. Un lot doit être totalement épuisé avant de puiser dans le lot suivant."},

  {q:"Pourquoi la méthode PEPS est-elle indispensable pour les produits avec DLC ?",
   o:["Elle simplifie les calculs comptables","Elle garantit que les produits les plus anciens sont vendus avant leur DLC, évitant tout risque sanitaire","Elle permet de lisser les prix d'achat","Elle est imposée par le Plan Comptable Général"],
   a:1,
   e:"La DLC est une obligation sanitaire stricte. PEPS garantit que les produits approchant leur DLC sont vendus en priorité, évitant invendus dangereux et infractions légales."},

  {q:"Un hypermarché reçoit des yaourts frais. Quelle méthode de valorisation doit-il appliquer et pourquoi ?",
   o:["CMUP, car les yaourts sont un produit alimentaire courant","PEPS, car les yaourts ont une DLC et leur rotation est une obligation sanitaire","CMUP fin de période, car les prix varient peu","PEPS ou CMUP selon le responsable de rayon"],
   a:1,
   e:"Les yaourts frais ont une DLC. L'ordre de sortie est impératif pour éviter la commercialisation de produits périmés. La méthode PEPS est donc obligatoire."},

  {q:"Un hypermarché gère son stock de boîtes de conserve (haricots verts). Quelle méthode applique-t-il ?",
   o:["PEPS, car ce sont des produits alimentaires","CMUP, car les conserves ont une DDM et non une DLC","PEPS, car la rotation est toujours prioritaire en alimentaire","Aucune méthode : les conserves n'ont pas de contrainte de date"],
   a:1,
   e:"Les conserves ont une DDM (date indicative, non obligatoire). La méthode CMUP s'applique : pas d'obligation sanitaire stricte sur l'ordre de sortie."},

  {q:"Quelle est la principale raison pour laquelle le CMUP ne convient pas aux produits avec DLC ?",
   o:["Il est trop complexe à calculer","Il ne prend pas en compte les quantités","Il ne garantit pas que les produits les plus anciens sortent en premier, ce qui crée un risque sanitaire","Il est interdit par le Plan Comptable Général pour l'alimentaire"],
   a:2,
   e:"Le CMUP ne distingue pas les lots par date d'entrée. Il ne garantit donc pas la sortie prioritaire des produits les plus anciens — ce qui est inacceptable pour les produits dont la DLC est dépassée."},

  {q:"Que signifie PCG ?",
   o:["Plan Commercial Global","Prix Comptable Garanti","Plan Comptable Général","Protocole de Contrôle de Gestion"],
   a:2,
   e:"PCG = Plan Comptable Général. C'est le référentiel comptable français obligatoire qui fixe les règles d'enregistrement et de valorisation des stocks pour toutes les entreprises."},

  {q:"Quelle obligation le PCG impose-t-il concernant les stocks ?",
   o:["Valoriser les stocks chaque semaine","Valoriser les stocks au coût réel au moins une fois par an, à la clôture du bilan","Utiliser uniquement la méthode PEPS","Faire un inventaire quotidien"],
   a:1,
   e:"Le PCG oblige toutes les entreprises à valoriser leurs stocks au coût réel au moins une fois par an, lors de la clôture du bilan comptable."},

  {q:"En hypermarché, à quelle fréquence la valorisation des stocks est-elle réalisée ?",
   o:["Une fois par an, conformément au PCG","En permanence, au coût réel","Une fois par mois","Une fois par trimestre"],
   a:1,
   e:"Au-delà de l'obligation légale annuelle du PCG, la grande distribution suit la valeur de ses stocks en permanence. Ce suivi continu optimise les approvisionnements et réduit ruptures et sur-stocks."},

  {q:"Quelles sont les deux variantes de la méthode CMUP ?",
   o:["CMUP journalier et CMUP mensuel","CMUP à chaque entrée et CMUP fin de période","CMUP alimentaire et CMUP non alimentaire","CMUP fournisseur et CMUP client"],
   a:1,
   e:"Le CMUP existe en deux variantes : à chaque entrée (recalculé à chaque nouvelle réception) et fin de période (calculé une seule fois à la fin du mois ou du trimestre)."},

  {q:"Un rayon textile reçoit plusieurs livraisons de t-shirts à des prix différents selon les fournisseurs. Quelle méthode est adaptée ?",
   o:["PEPS, pour vendre les plus anciens en premier","CMUP, pour lisser les variations de prix entre livraisons","PEPS ou CMUP selon la saison","Aucune méthode : le textile n'est pas soumis à la valorisation"],
   a:1,
   e:"Le textile est un produit non alimentaire sans DLC ni DDM. Le CMUP est adapté : il lisse les écarts de prix entre livraisons et simplifie la comptabilité du rayon."},

  {q:"Qu'est-ce qu'un bon de sortie dans une fiche de stock ?",
   o:["Un document constatant une réception de marchandises","Un document enregistrant une sortie de stock (vente, casse, perte, démarque)","Une autorisation d'achat fournisseur","Un bon de réduction accordé au client"],
   a:1,
   e:"Un bon de sortie documente toute diminution du stock : vente au client, casse, perte ou démarque. Il permet d'enregistrer la quantité, le prix unitaire et le montant sorti."},

  {q:"Laquelle de ces affirmations résume correctement la règle d'attribution des méthodes en hypermarché ?",
   o:["PEPS pour l'alimentaire, CMUP pour le non alimentaire","PEPS pour les DLC, CMUP pour les DDM et le non alimentaire","CMUP pour l'alimentaire, PEPS pour le non alimentaire","PEPS et CMUP sont interchangeables selon le responsable"],
   a:1,
   e:"La règle exacte : PEPS est réservé aux produits avec DLC (obligation sanitaire stricte). Le CMUP s'applique à tous les autres cas — produits avec DDM et produits non alimentaires."}
];

let cur=0,score=0,answered=false,results=[];

function render(){
  const q=Q[cur];
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('counter').textContent=(cur+1)+' / 20';
  document.getElementById('prog').style.width=((cur+1)/20*100)+'%';
  document.getElementById('score-live').textContent='Score : '+score+' / '+cur;
  const opts=document.getElementById('q-opts');
  opts.innerHTML='';
  q.o.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';b.textContent=o;
    b.onclick=()=>pick(i);
    opts.appendChild(b);
  });
  document.getElementById('q-expl').className='expl';
  document.getElementById('q-expl').textContent='';
  document.getElementById('btn-next').className='btn-next';
  answered=false;
}

function pick(i){
  if(answered)return;
  answered=true;
  const q=Q[cur];
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.disabled=true);
  const ok=(i===q.a);
  if(ok){score++;btns[i].classList.add('correct');}
  else{btns[i].classList.add('wrong');btns[q.a].classList.add('reveal');}
  results.push(ok);
  document.getElementById('score-live').textContent='Score : '+score+' / '+(cur+1);
  const expl=document.getElementById('q-expl');
  expl.textContent=q.e;expl.className='expl show';
  const btn=document.getElementById('btn-next');
  btn.className='btn-next show';
  btn.innerHTML=(cur<19?'Question suivante':'Voir mon score')+' <i class="ti ti-arrow-right" aria-hidden="true"></i>';
}

function nextQ(){
  cur++;
  if(cur>=20){showScore();return;}
  render();
}

function showScore(){
  document.getElementById('quiz-main').style.display='none';
  document.getElementById('quiz-score').style.display='block';
  document.getElementById('final-num').textContent=score;
  const grid=document.getElementById('recap-grid');
  grid.innerHTML='';
  results.forEach(r=>{
    const d=document.createElement('div');
    d.className='recap-dot '+(r?'dot-ok':'dot-no');
    grid.appendChild(d);
  });
  let msg='';
  if(score>=18)msg='Excellent ! Tu maîtrises parfaitement les méthodes de valorisation des stocks. Tu es prêt(e) pour l\'examen TP Employé Commercial (RNCP37099) !';
  else if(score>=14)msg='Très bien ! Quelques points à consolider. Relis les sections sur la distinction DLC / DDM et l\'attribution des méthodes PEPS / CMUP.';
  else if(score>=10)msg='Passable. Revois attentivement la règle fondamentale : PEPS pour les DLC uniquement, CMUP pour les DDM et le non alimentaire.';
  else msg='Continue tes révisions ! La règle clé à mémoriser : la DLC est la seule contrainte qui impose PEPS. Pour tout le reste, c\'est le CMUP.';
  document.getElementById('score-msg').textContent=msg;
}

function restart(){
  cur=0;score=0;answered=false;results=[];
  document.getElementById('quiz-main').style.display='block';
  document.getElementById('quiz-score').style.display='none';
  render();
}

render();
</script>
