
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.quiz-wrap{max-width:660px;padding:1.5rem 0}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.quiz-title{font-size:18px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:center;gap:10px}
.badge-q{font-size:12px;background:#E6F1FB;color:#185FA5;padding:3px 10px;border-radius:20px;border:0.5px solid #85B7EB}
.progress-bar{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width .4s}
.q-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:.75rem}
.q-num{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.5px}
.q-text{font-size:15px;color:var(--color-text-primary);line-height:1.55;margin-bottom:1rem;font-weight:500}
.q-options{display:flex;flex-direction:column;gap:8px}
.opt-btn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:.6rem 1rem;font-size:13px;color:var(--color-text-primary);cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:10px;line-height:1.4}
.opt-btn:hover:not(:disabled){background:var(--color-background-tertiary);border-color:var(--color-border-primary)}
.opt-btn.correct{background:#E1F5EE;border-color:#5DCAA5;color:#0F6E56}
.opt-btn.wrong{background:#FCEBEB;border-color:#F09595;color:#A32D2D}
.opt-letter{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--color-border-tertiary);font-size:11px;font-weight:500;flex-shrink:0;transition:all .15s}
.opt-btn.correct .opt-letter{background:#0F6E56;color:#E1F5EE}
.opt-btn.wrong .opt-letter{background:#A32D2D;color:#FCEBEB}
.feedback{font-size:12px;margin-top:.75rem;padding:.6rem .9rem;border-radius:var(--border-radius-md);display:none;line-height:1.5}
.feedback.show{display:block}
.feedback.ok{background:#E1F5EE;color:#0F6E56;border:0.5px solid #5DCAA5}
.feedback.ko{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.nav-btn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:.55rem 1.2rem;font-size:13px;cursor:pointer;color:var(--color-text-primary);display:flex;align-items:center;gap:6px}
.nav-btn:hover{background:var(--color-background-tertiary)}
.nav-btn:disabled{opacity:.4;cursor:default}
.nav-btn.primary{background:#E1F5EE;border-color:#5DCAA5;color:#0F6E56;font-weight:500}
.score-card{text-align:center;padding:2rem 1rem;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);display:none}
.score-big{font-size:48px;font-weight:500;color:var(--color-text-primary)}
.score-label{font-size:14px;color:var(--color-text-secondary);margin-bottom:1rem}
.score-msg{font-size:15px;color:var(--color-text-primary);margin-bottom:1.5rem}
.badge-score{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:1rem}
.restart-btn{background:#E1F5EE;border:0.5px solid #5DCAA5;border-radius:var(--border-radius-md);padding:.6rem 1.4rem;font-size:13px;cursor:pointer;color:#0F6E56;font-weight:500}
.q-counter{font-size:13px;color:var(--color-text-secondary)}
</style>

<div class="quiz-wrap">
  <div class="quiz-header">
    <div class="quiz-title">
      <i class="ti ti-brain" style="font-size:20px;color:#185FA5" aria-hidden="true"></i>
      Quiz — Journée 3
      <span class="badge-q">20 questions</span>
    </div>
    <span class="q-counter" id="counter">1 / 20</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:5%"></div></div>
  <div id="q-area"></div>
  <div class="score-card" id="score-card">
    <div class="score-big" id="sc-num">—</div>
    <div class="score-label">/ 20 bonnes réponses</div>
    <div class="badge-score" id="sc-badge"></div>
    <div class="score-msg" id="sc-msg"></div>
    <button class="restart-btn" onclick="restart()"><i class="ti ti-refresh" aria-hidden="true"></i> Recommencer</button>
  </div>
</div>

<script>
const qs=[
{q:"Quelle est la première étape de la procédure de réception des marchandises ?",opts:["Contrôler les produits livrés","Accueillir le fournisseur et décharger les produits","Signer le bon de livraison","Vérifier la qualité des produits"],a:1,exp:"L'accueil du fournisseur et le déchargement des produits est toujours la première étape. Un lieu et horaire précis ont été communiqués."},
{q:"Quel document est émis par le fournisseur lors d'une livraison directe (sans transporteur) ?",opts:["La lettre de voiture","Le bon de commande","Le bon de livraison (BL)","Le bon de réception signé"],a:2,exp:"Le bon de livraison (BL) est émis par le vendeur/fournisseur. Il mentionne ses coordonnées, les produits et la date de livraison."},
{q:"Quel document est émis par le transporteur quand le fournisseur ne livre pas lui-même ?",opts:["Le bon de livraison","La lettre de voiture (LV)","La facture","Le bon de commande"],a:1,exp:"La lettre de voiture (LV) est émise par le transporteur. Sa signature par le client libère le transporteur de sa responsabilité."},
{q:"Que signifie signer la lettre de voiture (LV) ?",opts:["On valide les quantités reçues","On libère le transporteur de sa responsabilité","On accepte la facture","On confirme la commande"],a:1,exp:"La signature de la lettre de voiture par le destinataire libère le transporteur de sa responsabilité sur le transport."},
{q:"Des réserves ont été formulées lors d'une livraison. Dans quel délai doivent-elles être confirmées par lettre recommandée (LRAR) ?",opts:["24 heures","48 heures","72 heures","1 semaine"],a:2,exp:"Les réserves doivent être confirmées par lettre recommandée avec accusé de réception (LRAR) dans les 72 heures (3 jours)."},
{q:"À quelle température maximale les produits frais doivent-ils être livrés ?",opts:["0°C","+ 5°C","+ 8°C","+ 12°C"],a:1,exp:"Les produits frais doivent être livrés à une température inférieure ou égale à + 5°C selon les normes de contrôle qualitatif."},
{q:"À quelle température maximale les produits surgelés doivent-ils être livrés ?",opts:["− 12°C","− 15°C","− 18°C","− 25°C"],a:2,exp:"Les surgelés doivent être livrés à une température inférieure à − 18°C. La présence de givre ou d'humidité est un signe de rupture de la chaîne du froid."},
{q:"Que signifie l'acronyme PCB ?",opts:["Prix Commercial Brut","Par Combien (unités dans un carton)","Produit Contrôlé Brut","Portée du Colis de Base"],a:1,exp:"PCB = « Par Combien » correspond au nombre d'unités dans un carton. Par ex. PCB 6 = 6 produits par carton. On l'appelle aussi UC ou UCV."},
{q:"Qu'est-ce qu'une rupture de rayon ?",opts:["Un produit absent de la réserve et du rayon","Un produit abîmé sur le rayon","Un produit absent du linéaire alors qu'il y en a en réserve","Un rayon mal organisé"],a:2,exp:"La rupture de rayon = produit absent du linéaire mais disponible en réserve. La solution : réassortir (aller chercher en réserve)."},
{q:"Que faut-il faire en cas de rupture de stock (et non de rayon) ?",opts:["Faire le facing","Réassortir depuis la réserve","Passer commande au fournisseur","Signaler au responsable et attendre"],a:2,exp:"En rupture de stock, la marchandise manque à la fois en rayon ET en réserve. Il faut se réapprovisionner en passant commande au fournisseur."},
{q:"Lors de la mise en rayon, comment doit-on placer les produits en termes de dates ?",opts:["Les dates les plus longues devant","Les dates les plus courtes devant","Sans ordre particulier","Par ordre alphabétique de marque"],a:1,exp:"La rotation FIFO (premier entré, premier sorti) : les dates les plus courtes doivent être placées à l'avant du rayon pour être vendues en priorité."},
{q:"Qu'est-ce que le FACING ?",opts:["L'étiquetage des prix sur les rayons","La présentation des articles vus de face, sur le devant de la tablette, sous leur face la plus vendeuse","Le rangement des stocks en réserve","La vérification des DLC"],a:1,exp:"Le facing consiste à disposer les articles vus de face, sur le devant de la tablette, sous leur face la plus attractive (vendeuse)."},
{q:"Dans le cadre de l'anti-gaspillage, quel est le seuil généralement appliqué pour détecter les produits à destockage ?",opts:["DDM inférieure à 1 mois","DDM inférieure à 2 mois","DDM inférieure à 3 mois","DDM inférieure à 6 mois"],a:2,exp:"L'action anti-gaspillage s'applique aux conserves dont la date (DDM) est inférieure à 3 mois selon les consignes du cours."},
{q:"Quelle est la différence entre DLC et DDM ?",opts:["Ce sont deux termes identiques","DLC concerne les produits frais périssables ; DDM concerne l'épicerie et signifie meilleure qualité jusqu'à cette date","DDM concerne les surgelés uniquement","DLC s'applique aux produits non alimentaires"],a:1,exp:"DLC = Date Limite de Consommation (produits périssables : frais, viandes…). DDM = Date de Durabilité Minimale (épicerie, conserves) : produit consommable mais qualité peut baisser après."},
{q:"Quel outil permet de mesurer le calibre des fruits et légumes lors du contrôle ?",opts:["Le thermomètre infrarouge","Le compas calibreur (calibreur à boucle)","La balance de contrôle","Un règle graduée"],a:1,exp:"Le calibreur à boucle (ou compas calibreur) permet de vérifier que le calibre des fruits et légumes est conforme aux exigences du bon de commande."},
{q:"Si aucune anomalie n'est constatée à la réception, que fait le réceptionnaire ?",opts:["Il refuse de signer","Il signe le BL et remet l'original au fournisseur en conservant sa copie","Il contacte son responsable avant de signer","Il formule des réserves par précaution"],a:1,exp:"Sans anomalie : le réceptionnaire et le fournisseur signent, le réceptionnaire remet le BL signé au fournisseur et conserve le bon de réception signé."},
{q:"Quelle est la capacité d'un rayon pour la référence B : 12 places, 0 article en rayon, PCB 6. Combien de cartons faut-il aller chercher en réserve ?",opts:["1 carton","2 cartons","3 cartons","0 carton"],a:1,exp:"Quantités manquantes = 12 − 0 = 12 articles. 12 ÷ 6 (PCB) = 2 cartons à aller chercher en réserve."},
{q:"Lequel de ces espaces N'est PAS un espace de stockage de la réserve ?",opts:["Chambre froide négative","Quai de déchargement","Linéaire (rayon en magasin)","Stockage sur palette"],a:2,exp:"Le linéaire est l'espace de vente en magasin, pas un espace de stockage en réserve. La réserve comprend : palettes, étagères, chambres froides, stockage sécurisé, quai de déchargement."},
{q:"Lors du contrôle qualitatif, que vérifie-t-on en priorité pour les produits non alimentaires ?",opts:["La date de péremption et la température","L'emballage intact et l'absence de produits cassés ou abîmés","Le calibre et le poids","La présence de givre ou d'humidité"],a:1,exp:"Pour les produits non alimentaires : on vérifie que l'emballage est fermé et intact, et que les produits ne sont pas cassés ou abîmés."},
{q:"Un produit est disposé dans le fond du rayon, loin des clients. Quelle action de facing faut-il réaliser ?",opts:["Changer l'étiquette de prix","Avancer les articles sur le devant de la tablette","Empiler les articles par 2 en hauteur","Mettre le produit sur sa face la plus attractive"],a:1,exp:"Quand les produits sont dans le fond du rayon, l'action de facing consiste à les avancer sur le devant de la tablette pour les rendre accessibles et visibles."}
];

let cur=0,score=0,answered=[];
for(let i=0;i<qs.length;i++)answered.push(null);

function render(){
  const qa=document.getElementById('q-area');
  const sc=document.getElementById('score-card');
  if(cur>=qs.length){qa.style.display='none';sc.style.display='block';showScore();return;}
  qa.style.display='block';sc.style.display='none';
  const q=qs[cur];
  const letters=['A','B','C','D'];
  const isAns=answered[cur]!==null;
  let optsHtml=q.opts.map((o,i)=>{
    let cls='opt-btn';
    if(isAns){
      if(i===q.a)cls+=' correct';
      else if(i===answered[cur]&&answered[cur]!==q.a)cls+=' wrong';
    }
    return `<button class="${cls}" onclick="pick(${i})" ${isAns?'disabled':''}><span class="opt-letter">${letters[i]}</span>${o}</button>`;
  }).join('');
  let fbHtml='';
  if(isAns){
    const ok=answered[cur]===q.a;
    fbHtml=`<div class="feedback show ${ok?'ok':'ko'}"><strong>${ok?'✓ Bonne réponse !':'✗ Mauvaise réponse.'}</strong> ${q.exp}</div>`;
  }
  qa.innerHTML=`<div class="q-card"><div class="q-num">Question ${cur+1} sur ${qs.length}</div><div class="q-text">${q.q}</div><div class="q-options">${optsHtml}</div>${fbHtml}</div><div class="nav-row"><button class="nav-btn" onclick="go(-1)" ${cur===0?'disabled':''}><i class="ti ti-arrow-left" aria-hidden="true"></i> Précédent</button><button class="nav-btn primary" onclick="go(1)" ${!isAns?'disabled':''}>${cur===qs.length-1?'Voir mon score':'Suivant <i class="ti ti-arrow-right" aria-hidden="true"></i>'}</button></div>`;
  document.getElementById('counter').textContent=`${cur+1} / ${qs.length}`;
  document.getElementById('prog').style.width=`${Math.round(((cur+1)/qs.length)*100)}%`;
}

function pick(i){
  if(answered[cur]!==null)return;
  answered[cur]=i;
  if(i===qs[cur].a)score++;
  render();
}

function go(d){
  cur+=d;
  if(cur<0)cur=0;
  if(cur>qs.length)cur=qs.length;
  render();
}

function showScore(){
  const pct=Math.round((score/qs.length)*100);
  document.getElementById('sc-num').textContent=score;
  const b=document.getElementById('sc-badge');
  const m=document.getElementById('sc-msg');
  if(pct>=90){b.style.cssText='background:#E1F5EE;color:#0F6E56;border:0.5px solid #5DCAA5';b.textContent='Excellent !';m.textContent='Parfaite maîtrise des notions de la journée 3. Tu es prêt(e) pour l\'évaluation !';}
  else if(pct>=70){b.style.cssText='background:#FAEEDA;color:#854F0B;border:0.5px solid #EF9F27';b.textContent='Bien !';m.textContent='Bonne base ! Relis les points sur lesquels tu as hésité pour consolider tes connaissances.';}
  else if(pct>=50){b.style.cssText='background:#FAECE7;color:#993C1D;border:0.5px solid #F0997B';b.textContent='À revoir';m.textContent='Consulte la fiche de révision ci-dessus et retravaille les notions clés avant l\'évaluation.';}
  else{b.style.cssText='background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595';b.textContent='À retravailler';m.textContent='Reprends la fiche de révision en détail. N\'hésite pas à relire le cours et recommencer ce quiz !';}
}

function restart(){
  cur=0;score=0;
  for(let i=0;i<qs.length;i++)answered[i]=null;
  render();
}

render();
</script>
